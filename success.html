<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Status — RulzStore</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="site-header">
    <div class="shell">
      <a href="/" class="logo"><span class="dot"></span>RulzStore</a>
    </div>
  </header>

  <div class="status-page">
    <div class="status-card" id="statusCard">
      <div class="status-icon processing" id="statusIcon">⏳</div>
      <h2 id="statusTitle">Processing your order…</h2>
      <p id="statusSub">Hang tight, this usually takes a few seconds.</p>
      <div class="receipt" id="receipt"></div>
      <a class="back-home" href="/">← Back to all games</a>
    </div>
  </div>

  <script src="/js/success.js"></script>
</body>
</html>
